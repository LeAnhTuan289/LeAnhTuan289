<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" height="260">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#0e1424" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.02" />
    </pattern>

    <!-- Glow Filters -->
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="purple-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Card Background -->
  <rect width="850" height="260" fill="url(#bg-grad)" rx="16" />

  <!-- Grid Pattern Overlay -->
  <rect width="850" height="260" fill="url(#grid)" rx="16" />

  <!-- Ambient Glow Background Circles -->
  <circle cx="750" cy="130" r="140" fill="#3b82f6" opacity="0.12" filter="url(#cyan-glow)" />
  <circle cx="720" cy="130" r="90" fill="#a855f7" opacity="0.08" filter="url(#purple-glow)" />
  <circle cx="100" cy="200" r="120" fill="#3b82f6" opacity="0.06" filter="url(#cyan-glow)" />

  <!-- RIGHT SIDE: Data Analytics Git-like Nodes and Connections -->
  <g opacity="0.85">
    <!-- Connecting Lines -->
    <!-- Cyan line (Main branch) -->
    <path d="M 560 130 L 630 130 L 670 90 L 740 90" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" />
    <!-- Purple line (Secondary branch) -->
    <path d="M 630 130 L 670 170 L 740 170" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" opacity="0.7" />

    <!-- Outer Nodes Glow (Ring representation of nodes) -->
    <circle cx="560" cy="130" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" />
    <circle cx="630" cy="130" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" />
    <circle cx="670" cy="90" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" />
    <circle cx="740" cy="90" r="8" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" />
    <circle cx="670" cy="170" r="8" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.4" />
    <circle cx="740" cy="170" r="8" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.4" />

    <!-- Inner Nodes -->
    <circle cx="560" cy="130" r="4.5" fill="#06b6d4" />
    <circle cx="630" cy="130" r="4.5" fill="#06b6d4" />
    <circle cx="670" cy="90" r="4.5" fill="#06b6d4" />
    <circle cx="740" cy="90" r="4.5" fill="#06b6d4" />
    <circle cx="670" cy="170" r="4.5" fill="#a855f7" />
    <circle cx="740" cy="170" r="4.5" fill="#a855f7" />
  </g>

  <!-- TOP RIGHT: Open for Opportunities Badge -->
  <g transform="translate(670, 35)">
    <!-- Pill background (Dark transparent green) -->
    <rect width="130" height="26" rx="13" fill="#0c231a" stroke="#10b981" stroke-width="1" />
    <!-- Pulse Circle -->
    <circle cx="18" cy="13" r="4.5" fill="#10b981" />
    <circle cx="18" cy="13" r="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5" />
    <!-- Badge Text -->
    <text x="32" y="17" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11.5" fill="#10b981">Open for Work</text>
  </g>

  <!-- LEFT SIDE: Text and Details -->
  <!-- Name -->
  <text x="50" y="92" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="44" fill="#ffffff" letter-spacing="-0.5">Lê Anh Tuấn</text>

  <!-- Title -->
  <text x="50" y="130" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#3b82f6" letter-spacing="1.5">DATA ANALYST</text>

  <!-- Descriptive Points -->
  <!-- Point 1 -->
  <g transform="translate(50, 168)">
    <text x="0" y="0" font-size="16">🚀</text>
    <text x="24" y="-3" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="13.5" fill="#94a3b8">Building end-to-end data pipelines &amp; ETL workflows</text>
  </g>

  <!-- Point 2 -->
  <g transform="translate(50, 198)">
    <text x="0" y="0" font-size="16">📊</text>
    <text x="24" y="-3" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="13.5" fill="#94a3b8">Turning raw datasets into interactive, business-driven dashboards</text>
  </g>
</svg>
